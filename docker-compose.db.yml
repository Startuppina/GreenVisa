
services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: greenvisa-db
    ports:
      - "5432:5432"
    volumes:
      - greenvisa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d green-visa" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb
    container_name: greenvisa-pgweb
    environment:
      # pgweb legge DATABASE_URL (non PGW_*); così apre subito il DB senza form di connessione
      DATABASE_URL: postgres://admin:pass123@db:5432/green-visa?sslmode=disable
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

volumes:
  greenvisa_postgres_data: