version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./server/uploaded_img:/app/uploaded_img
    depends_on:
      db:
        condition: service_healthy # Attende che il db sia sano

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
      - /app/node_modules
    depends_on:
      - server
    environment:
      - CHOKIDAR_USEPOLLING=true

  db:
    image: postgres
    environment:
      POSTGRES_DB: green-visa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - green-visa-db:/var/lib/postgresql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d green-visa" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb
    environment:
      PGW_DB_HOST: db
      PGW_DB_USER: admin
      PGW_DB_PASS: pass123
      PGW_DB_NAME: green-visa
    ports:
      - "8081:8081"
    depends_on:
      - db

volumes:
  green-visa-db:
  client-data:


