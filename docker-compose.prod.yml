services:
  server:
    build:
      context: ./server
      dockerfile: dockerfile
    command: ["node", "server"]
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - NODE_ENV=production
    volumes:
      - ./server/uploaded_img:/app/uploaded_img
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: green-visa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - green-visa-db:/var/lib/postgresql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d green-visa" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  green-visa-db:
